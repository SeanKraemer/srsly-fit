runtime: nodejs20

env:
  - variable: APP_MODE
    value: "demo"
    availability:
      - RUNTIME

  - variable: AUTH_SECRET
    value: "SET_AUTH_SECRET_IN_HOSTING"
    availability:
      - RUNTIME

  - variable: AUTH_TRUST_HOST
    value: "true"
    availability:
      - RUNTIME

  - variable: DATABASE_URL
    value: ""
    availability:
      - RUNTIME

  - variable: YOUTUBE_API_KEY
    value: ""
    availability:
      - RUNTIME
